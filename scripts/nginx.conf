# ============================================================
# UIBlocks - Nginx Configuration
# Reverse proxy for production Docker deployment
# ============================================================

upstream uiblocks_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP → HTTPS redirect (enable after SSL setup)
server {
    listen 80;
    server_name your-domain.com;  # ← Replace with your actual domain
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # ← Replace with your actual domain

    # ============================================================
    # SSL Configuration (enable after Let's Encrypt setup)
    # ============================================================
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (uncomment after confirming SSL works)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ============================================================
    # Security Headers
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.neon.tech;" always;

    # ============================================================
    # Gzip Compression
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        image/webp
        font/woff
        font/woff2;

    # ============================================================
    # Client Settings
    # ============================================================
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65;

    # ============================================================
    # Static File Caching (frontend build)
    # ============================================================
    location /assets/ {
        proxy_pass http://uiblocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Cache static assets aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # API Proxy
    # ============================================================
    location /api/ {
        proxy_pass http://uiblocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ============================================================
    # WebSocket Support
    # ============================================================
    location /ws/ {
        proxy_pass http://uiblocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ============================================================
    # Health Check Endpoint (no caching)
    # ============================================================
    location /api/health {
        proxy_pass http://uiblocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ============================================================
    # SPA Fallback - All other routes go to index.html
    # ============================================================
    location / {
        proxy_pass http://uiblocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Moderate caching for HTML
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ============================================================
    # Deny access to hidden files
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # Deny access to sensitive files
    # ============================================================
    location ~ (\.env|\.git|package-lock\.json|composer\.lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}